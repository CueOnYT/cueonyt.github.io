<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Game Central</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎉 Party Game Central</h1>

        <!-- Supabase SDK -->
<script src="https://jsdelivr.net"></script>

<!-- Keep the rest of your HTML structure from before -->

        <!-- Step 1: Select a Game -->
        <section id="game-selection">
            <h2>Select a Game</h2>
            <div class="game-grid">
                <div class="game-card" onclick="selectGame('Trivia Night')">Trivia Night</div>
                <div class="game-card" onclick="selectGame('Charades')">Charades</div>
                <div class="game-card" onclick="selectGame('Quick Draw')">Quick Draw</div>
            </div>
        </section>

        <!-- Step 2: Create Party -->
        <section id="party-creation" class="hidden">
            <h2>Selected: <span id="selected-game-name"></span></h2>
            <button id="create-party-btn" onclick="createParty()">Create Party</button>
        </section>

        <!-- Step 3: Party Dashboard -->
        <section id="party-dashboard" class="hidden">
            <div class="invite-box">
                <p>Your Party is Live!</p>
                <h3>Invite Code: <span id="invite-code">XXXX-XX</span></h3>
                <p>Share this with your teammate to join.</p>
            </div>
            <button onclick="resetParty()">End Party</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
